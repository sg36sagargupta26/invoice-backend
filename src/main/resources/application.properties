# Frankfurter API REST Client configuration
frankfurter-api/mp-rest/url=https://api.frankfurter.app

# CORS configuration for frontend access
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Location,Content-Type
